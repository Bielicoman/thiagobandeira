<!DOCTYPE html>
<html lang="pt-BR" data-theme="dark">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thiago Bandeira - Links</title>
  <meta name="description" content="Links do THIAGO BANDEIRA — Diretor de Fotografia e Produtor Audiovisual." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@100;300;400;600;800;900&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet" />

  <!-- Icons -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    /* ─── PRELOADER ─── */
    .preloader {
      position: fixed;
      inset: 0;
      z-index: 9999;
      background: #000306;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: opacity 0.8s var(--spring), visibility 0.8s;
    }

    .preloader.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .pl-inner {
      text-align: center;
      width: 100%;
      max-width: 280px;
    }

    .pl-logo {
      font-family: 'Outfit', sans-serif;
      font-size: 1.2rem;
      font-weight: 800;
      letter-spacing: 6px;
      color: #f0f4ff;
      margin-bottom: 1.5rem;
    }

    .pl-logo span {
      color: #3b7ef8;
      font-style: italic;
    }

    .pl-bar-wrap {
      width: 100%;
      height: 2px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .pl-bar {
      height: 100%;
      width: 0%;
      background: #3b7ef8;
      transition: width 1.5s ease-in-out;
    }

    .pl-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.45rem;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.3);
      text-transform: uppercase;
    }

    /* ─── CURSOR HUD ─── */
    #cursor {
      position: fixed;
      top: 0;
      left: 0;
      width: 0;
      height: 0;
      z-index: 100000;
      pointer-events: none;
    }

    .cursor-ring {
      position: fixed;
      top: 0;
      left: 0;
      width: 44px;
      height: 44px;
      border: 1px solid rgba(255, 255, 255, 0.4);
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(4px);
      border-radius: 50%;
      pointer-events: none;
      will-change: transform;
    }

    .cursor-dot {
      position: fixed;
      top: 0;
      left: 0;
      width: 6px;
      height: 6px;
      background: var(--royal-bright);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--royal-bright);
      pointer-events: none;
      will-change: transform;
    }

    body.cursor-hover .cursor-ring {
      width: 65px;
      height: 65px;
      background: rgba(255, 255, 255, 0.1);
      border-color: rgba(255, 255, 255, 0.6);
      transition: width 0.3s var(--spring), height 0.3s var(--spring), background 0.3s, border-color 0.3s;
    }

    body.cursor-click .cursor-ring {
      transform: translate(-50%, -50%) scale(0.8);
    }

    @media (pointer: fine) {

      .cursor-ring,
      .cursor-dot {
        display: block !important;
      }

      body {
        cursor: none !important;
      }

      a,
      button {
        cursor: none !important;
      }
    }

    :root {
      --bg: #000306;
      --royal: #1a45c8;
      --royal-bright: #3b7ef8;
      --text: #f0f4ff;
      --text-muted: #6e82a8;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --font-display: 'Outfit', sans-serif;
      --font-serif: 'Outfit', sans-serif;
      --font-mono: 'Inter', sans-serif;
      --spring: cubic-bezier(0.16, 1, 0.3, 1);
    }

    *,
    *::before,
    *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-display);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4rem 1.5rem;
    }

    /* Animated Mesh Background with Noise */
    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: var(--bg);
      overflow: hidden;
    }

    .bg-mesh::before {
      content: '';
      position: absolute;
      width: 150vw;
      height: 150vh;
      top: -25%;
      left: -25%;
      background:
        radial-gradient(circle at 20% 30%, rgba(26, 69, 200, 0.2) 0%, transparent 45%),
        radial-gradient(circle at 80% 70%, rgba(59, 126, 248, 0.15) 0%, transparent 45%),
        radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 1) 0%, transparent 100%);
      filter: blur(100px);
      animation: meshRotate 40s linear infinite;
      opacity: 0.8;
    }

    .bg-liquid {
      position: fixed;
      inset: 0;
      z-index: -1;
      background: radial-gradient(circle at var(--mx, 50%) var(--my, 50%), rgba(26, 69, 200, 0.08) 0%, transparent 50%);
      pointer-events: none;
    }

    .bg-noise {
      position: fixed;
      inset: 0;
      z-index: -1;
      opacity: 0.035;
      pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3BaseFilter id='filter'%3BfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23filter)'/%3E%3C/svg%3E");
    }

    @keyframes meshRotate {
      from {
        transform: rotate(0deg) scale(1.2);
      }

      to {
        transform: rotate(360deg) scale(1.2);
      }
    }

    .container {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      position: relative;
    }

    /* Premium Header */
    .header {
      text-align: center;
      margin-bottom: 3.5rem;
      position: relative;
    }

    .profile-img-wrap {
      position: relative;
      width: 120px;
      height: 120px;
      margin: 0 auto 1.5rem;
    }

    .profile-img {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--glass-border);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
      position: relative;
      z-index: 2;
    }

    .img-glow {
      position: absolute;
      inset: -15px;
      background: radial-gradient(circle, var(--royal-bright) 0%, transparent 70%);
      opacity: 0.2;
      filter: blur(20px);
      animation: glowPulse 4s ease-in-out infinite alternate;
    }

    @keyframes glowPulse {
      from {
        opacity: 0.1;
        transform: scale(0.9);
      }

      to {
        opacity: 0.3;
        transform: scale(1.1);
      }
    }

    .name {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 400;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .name em {
      font-style: italic;
      color: var(--royal-bright);
      font-weight: 900;
    }

    .role {
      font-family: 'Inter', sans-serif;
      font-size: 0.62rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
    }

    /* Links List */
    .links-grid {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .section-title {
      font-family: 'Inter', sans-serif;
      font-size: 0.58rem;
      font-weight: 600;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 1.5rem 0 0.5rem;
      opacity: 0.6;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .link-card {
      width: 100%;
      padding: 0.8rem;
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 18px;
      text-decoration: none;
      color: var(--text);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      transition: all 0.4s var(--spring);
      position: relative;
      overflow: hidden;
    }

    .link-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.05), transparent);
      transform: translateX(-100%);
      transition: transform 0.6s var(--spring);
    }

    .link-card:hover {
      background: rgba(255, 255, 255, 0.06);
      border-color: rgba(59, 126, 248, 0.3);
      transform: translateY(-4px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
    }

    .link-card:hover::before {
      transform: translateX(100%);
    }

    .card-thumb {
      width: 44px;
      height: 44px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
      border: 1px solid var(--glass-border);
    }

    .card-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .card-icon {
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
      background: rgba(59, 126, 248, 0.1);
      border-radius: 12px;
      color: var(--royal-bright);
      transition: all 0.3s;
    }

    .link-card:hover .card-icon {
      transform: rotate(-5deg) scale(1.1);
      background: var(--royal-bright);
      color: white;
    }

    .card-info {
      flex: 1;
    }

    .card-meta-wrap {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2px;
    }

    .card-label {
      font-family: 'Inter', sans-serif;
      font-size: 0.48rem;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .hud-tag {
      font-family: 'Inter', sans-serif;
      font-size: 0.42rem;
      font-weight: 600;
      color: var(--royal-bright);
      opacity: 0.5;
      border: 1px solid rgba(59, 126, 248, 0.2);
      padding: 1px 4px;
      border-radius: 2px;
    }

    .card-title {
      display: block;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: -0.2px;
    }

    .card-arrow {
      font-size: 0.7rem;
      color: var(--text-muted);
      transition: 0.3s;
      opacity: 0.4;
    }

    .link-card:hover .card-arrow {
      color: var(--royal-bright);
      transform: translateX(5px);
      opacity: 1;
    }

    /* Footer */
    .footer {
      margin-top: 4rem;
      text-align: center;
    }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-mono);
      font-size: 0.6rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 99px;
      border: 1px solid var(--glass-border);
      transition: 0.3s;
    }

    .back-btn:hover {
      background: var(--glass);
      color: var(--text);
      border-color: var(--royal-bright);
    }

    @media (max-width: 480px) {
      .name {
        font-size: 1.8rem;
      }
    }

    /* ─── Inter 600 + tamanhos maiores para legibilidade ─── */
    .back-btn,
    .role,
    .section-title,
    .card-label,
    .hud-tag {
      font-family: 'Inter', sans-serif !important;
      font-weight: 600 !important;
    }

    .role {
      font-size: 0.75rem !important;
      letter-spacing: 3px !important;
    }

    .section-title {
      font-size: 0.7rem !important;
    }

    .card-label {
      font-size: 0.62rem !important;
    }

    .hud-tag {
      font-size: 0.58rem !important;
    }

    .back-btn {
      font-size: 0.7rem !important;
    }
  </style>
</head>

<body>
  <div class="preloader" id="preloader">
    <div class="pl-inner">
      <div class="pl-logo">THIAGO <span>BANDEIRA</span></div>
      <div class="pl-bar-wrap">
        <div class="pl-bar" id="plBar"></div>

  <div id="cursor">
    <div class="cursor-dot"></div>
    <div class="cursor-ring"></div>
  </div>

  <div class="bg-mesh"></div>
  <div class="bg-liquid" id="bgLiquid"></div>

  <div class="container" id="content">
    <!-- Header -->
    <header class="header">

    <div class="links-grid">

        <span style="padding: 0 15px;">Links</span>

      <a href="https://instagram.com/thiagoo_bandeira" target="_blank" class="link-card">

        <i class="fas fa-external-link-alt card-arrow"></i>
      </a>

      <a href="https://www.linkedin.com/in/thiago-bandeira-0956a0301/" target="_blank" class="link-card">
        <div class="card-icon"><i class="fab fa-linkedin-in"></i></div>
        <div class="card-info">
          <div class="card-meta-wrap">
            <span class="card-label">LinkedIn</span>
            <span class="hud-tag">PROFESSIONAL</span>
          </div>
          <span class="card-title">Thiago Bandeira</span>

      <a href="https://wa.me/5527997475747" target="_blank" class="link-card">

      <p
        style="margin-top: 2rem; font-family: var(--font-mono); font-size: 0.5rem; color: var(--text-muted); opacity: 0.4;">
        © 2026 THIAGO BANDEIRA · CINEMATOGRAPHY
      </p>
    </footer>

  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script>
    // 1. Preloader logic
    window.addEventListener('load', () => {
      const pl = document.getElementById('preloader');
      const bar = document.getElementById('plBar');
      if (bar) bar.style.width = '100%';

      setTimeout(() => {
        pl.classList.add('hidden');
        initEntrance();
      }, 1500);
    });

    // 2. Custom Cursor (GSAP Precision Sync)
    document.addEventListener('DOMContentLoaded', () => {
      const ring = document.querySelector('.cursor-ring');
      const dot = document.querySelector('.cursor-dot');
  
      if (ring && dot) {
        gsap.set([ring, dot], { xPercent: -50, yPercent: -50 });
        
        window.addEventListener('mousemove', e => {
          gsap.set(dot, { x: e.clientX, y: e.clientY });
          gsap.set(ring, { x: e.clientX, y: e.clientY });
          
          // Update background liquid glow
          const bgLiquid = document.getElementById('bgLiquid');
          if (bgLiquid) {
            bgLiquid.style.setProperty('--mx', (e.clientX/window.innerWidth*100) + '%');
            bgLiquid.style.setProperty('--my', (e.clientY/window.innerHeight*100) + '%');
          }
        });
  
        document.querySelectorAll('a, button').forEach(el => {
          el.addEventListener('mouseenter', () => document.body.classList.add('cursor-hover'));
          el.addEventListener('mouseleave', () => document.body.classList.remove('cursor-hover'));
        });
        document.addEventListener('mousedown', () => document.body.classList.add('cursor-click'));
        document.addEventListener('mouseup',   () => document.body.classList.remove('cursor-click'));
      }
    });

    // 3. Entrance Animation
    function initEntrance() {
      gsap.from(".header", { y: 40, opacity: 0, duration: 1.2, ease: "power4.out" });
      gsap.from(".link-card", {
        y: 30,
        opacity: 0,
        duration: 1,
        stagger: 0.08,
        ease: "power3.out",
        clearProps: "all"
      });
      gsap.from(".section-title", { opacity: 0, scaleX: 0, transformOrigin: "left", duration: 1, stagger: 0.2 });
    }

    // 4. Magnetic Effect refinement
    document.querySelectorAll('.link-card').forEach(card => {
      card.addEventListener('mousemove', (e) => {
        const rect = card.getBoundingClientRect();
        const x = e.clientX - rect.left - rect.width / 2;
        const y = e.clientY - rect.top - rect.height / 2;
        gsap.to(card, { x: x * 0.1, y: y * 0.1, duration: 0.4, ease: "power2.out" });
      });
      card.addEventListener('mouseleave', () => {
        gsap.to(card, { x: 0, y: 0, duration: 0.6, ease: "elastic.out(1, 0.4)" });
      });
    });
  </script>
